name: backfill-release

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: Stable upstream libwebp tag to publish, for example v1.6.0
        required: true
        type: string
      publish_to_main:
        description: Also update the default branch Package.swift to this version
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: backfill-release-${{ inputs.upstream_tag }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15
    env:
      REPOSITORY_OWNER: ${{ github.repository_owner }}
      REPOSITORY_NAME: ${{ github.event.repository.name }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Verify build prerequisites
        run: |
          set -euo pipefail

          command -v cmake >/dev/null 2>&1 || brew install cmake
          command -v xcodebuild >/dev/null
          command -v swift >/dev/null
          command -v plutil >/dev/null
          xcrun --find vtool >/dev/null
          xcrun --sdk iphoneos --show-sdk-path >/dev/null
          xcrun --sdk iphonesimulator --show-sdk-path >/dev/null
          xcrun --sdk macosx --show-sdk-path >/dev/null
          xcrun --sdk appletvos --show-sdk-path >/dev/null
          xcrun --sdk appletvsimulator --show-sdk-path >/dev/null
          xcrun --sdk watchos --show-sdk-path >/dev/null
          xcrun --sdk watchsimulator --show-sdk-path >/dev/null
          xcrun --sdk xros --show-sdk-path >/dev/null
          xcrun --sdk xrsimulator --show-sdk-path >/dev/null

      - name: Fetch upstream tag refs
        run: |
          git remote add upstream https://github.com/webmproject/libwebp.git
          git fetch --force upstream 'refs/tags/*:refs/upstream-tags/*'

      - name: Validate requested upstream tag
        id: release_tag
        run: |
          set -euo pipefail

          target_tag="$(python3 scripts/spm_release.py assert-stable-tag --tag "${{ inputs.upstream_tag }}")"
          upstream_commit="$(git rev-parse "refs/upstream-tags/${target_tag}^{commit}")"
          git rev-parse --verify --quiet "refs/upstream-tags/${target_tag}^{commit}" >/dev/null

          remote_tag_commit="$(
            git ls-remote --tags --refs origin "refs/tags/${target_tag}" \
              | awk 'NR == 1 { print $1 }'
          )"
          if [[ -n "${remote_tag_commit}" ]]; then
            git fetch --force origin "refs/tags/${target_tag}:refs/tags/${target_tag}"
            remote_tag_exists=true
            remote_tag_commit="$(git rev-parse "refs/tags/${target_tag}^{commit}")"
          else
            remote_tag_exists=false
          fi

          echo "target_tag=${target_tag}" >> "${GITHUB_OUTPUT}"
          echo "upstream_commit=${upstream_commit}" >> "${GITHUB_OUTPUT}"
          echo "remote_tag_exists=${remote_tag_exists}" >> "${GITHUB_OUTPUT}"
          echo "remote_tag_commit=${remote_tag_commit}" >> "${GITHUB_OUTPUT}"

      - name: Export upstream source tree
        id: source_tree
        run: |
          set -euo pipefail

          source_dir="${RUNNER_TEMP}/libwebp-source"
          rm -rf "${source_dir}"
          mkdir -p "${source_dir}"

          git archive --format=tar "refs/upstream-tags/${{ steps.release_tag.outputs.target_tag }}" \
            | tar -xf - -C "${source_dir}"

          echo "source_dir=${source_dir}" >> "${GITHUB_OUTPUT}"

      - name: Build release artifacts
        id: build
        run: |
          set -euo pipefail

          artifacts_dir="${RUNNER_TEMP}/release-artifacts"
          metadata_dir="${RUNNER_TEMP}/release-metadata"
          validation_dir="${RUNNER_TEMP}/package-validation"

          rm -rf "${artifacts_dir}" "${metadata_dir}" "${validation_dir}"
          mkdir -p "${artifacts_dir}" "${metadata_dir}" "${validation_dir}"

          ./scripts/build_apple_xcframeworks.sh \
            --source-dir "${{ steps.source_tree.outputs.source_dir }}" \
            --output-dir "${artifacts_dir}" \
            --tag "${{ steps.release_tag.outputs.target_tag }}"

          python3 scripts/spm_release.py compute-checksums \
            --archives-dir "${artifacts_dir}" \
            --output "${metadata_dir}/checksums.json"

          python3 scripts/spm_release.py render-package-swift \
            --owner "${REPOSITORY_OWNER}" \
            --repository "${REPOSITORY_NAME}" \
            --tag "${{ steps.release_tag.outputs.target_tag }}" \
            --checksums-json "${metadata_dir}/checksums.json" \
            --output "${metadata_dir}/Package.swift"

          cp "${metadata_dir}/Package.swift" "${validation_dir}/Package.swift"
          swift package dump-package --package-path "${validation_dir}" >/dev/null

          cat > "${metadata_dir}/release-notes.md" <<EOF
          Manual mergeable binary release for upstream libwebp ${{ steps.release_tag.outputs.target_tag }}.

          Upstream source commit: ${{ steps.release_tag.outputs.upstream_commit }}

          Published artifacts:
          - Mergeable WebP.xcframework.zip
          - Mergeable WebPDecoder.xcframework.zip
          - Mergeable WebPDemux.xcframework.zip
          - Mergeable WebPMux.xcframework.zip
          - Mergeable SharpYuv.xcframework.zip
          - checksums.json
          EOF

          echo "artifacts_dir=${artifacts_dir}" >> "${GITHUB_OUTPUT}"
          echo "metadata_dir=${metadata_dir}" >> "${GITHUB_OUTPUT}"

      - name: Plan publication mode
        id: publication
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          target_tag="${{ steps.release_tag.outputs.target_tag }}"
          release_assets_file="${RUNNER_TEMP}/release-assets.txt"
          existing_package_file="${RUNNER_TEMP}/existing-package.swift"
          : > "${release_assets_file}"

          release_exists=false
          if gh release view "${target_tag}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json assets \
            --jq '.assets[].name' > "${release_assets_file}" 2>/dev/null; then
            release_exists=true
          fi

          if [[ "${{ steps.release_tag.outputs.remote_tag_exists }}" == "true" ]]; then
            if ! git show "refs/tags/${target_tag}:Package.swift" > "${existing_package_file}" 2>/dev/null; then
              echo "Existing package tag ${target_tag} does not contain Package.swift." >&2
              exit 1
            fi

            if ! cmp -s "${existing_package_file}" "${{ steps.build.outputs.metadata_dir }}/Package.swift"; then
              echo "Existing package tag ${target_tag} does not match the generated Package.swift." >&2
              exit 1
            fi
          fi

          plan_args=(release-publish-plan --tag "${target_tag}")
          if [[ "${{ steps.release_tag.outputs.remote_tag_exists }}" == "true" ]]; then
            plan_args+=(--tag-exists)
          fi
          while IFS= read -r asset_name; do
            [[ -n "${asset_name}" ]] || continue
            plan_args+=(--asset "${asset_name}")
          done < "${release_assets_file}"

          plan_json="$(python3 scripts/spm_release.py "${plan_args[@]}")"
          mode="$(printf '%s' "${plan_json}" | python3 -c 'import json,sys; print(json.load(sys.stdin)["mode"])')"
          missing_assets="$(
            printf '%s' "${plan_json}" \
              | python3 -c 'import json,sys; print(",".join(json.load(sys.stdin)["missing_assets"]))'
          )"

          echo "mode=${mode}" >> "${GITHUB_OUTPUT}"
          echo "release_exists=${release_exists}" >> "${GITHUB_OUTPUT}"
          echo "missing_assets=${missing_assets}" >> "${GITHUB_OUTPUT}"

      - name: Create package commit and push release tag
        if: steps.publication.outputs.mode == 'fresh'
        id: git_release
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          release_branch="release/${{ steps.release_tag.outputs.target_tag }}"
          git switch --create "${release_branch}"

          cp "${{ steps.build.outputs.metadata_dir }}/Package.swift" Package.swift
          git add Package.swift

          if git diff --cached --quiet -- Package.swift; then
            commit_sha="$(git rev-parse HEAD)"
          else
            git commit -m "Release ${{ steps.release_tag.outputs.target_tag }}"
            commit_sha="$(git rev-parse HEAD)"
          fi

          git tag "${{ steps.release_tag.outputs.target_tag }}" "${commit_sha}"
          git push origin "refs/tags/${{ steps.release_tag.outputs.target_tag }}"

          echo "commit_sha=${commit_sha}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        if: steps.publication.outputs.mode == 'fresh'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release create "${{ steps.release_tag.outputs.target_tag }}" \
            "${{ steps.build.outputs.artifacts_dir }}"/*.zip \
            "${{ steps.build.outputs.metadata_dir }}/checksums.json" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${{ steps.git_release.outputs.commit_sha }}" \
            --title "${{ steps.release_tag.outputs.target_tag }}" \
            --notes-file "${{ steps.build.outputs.metadata_dir }}/release-notes.md"

      - name: Repair GitHub release
        if: steps.publication.outputs.mode == 'repair'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "${{ steps.publication.outputs.release_exists }}" == "true" ]]; then
            gh release upload "${{ steps.release_tag.outputs.target_tag }}" \
              "${{ steps.build.outputs.artifacts_dir }}"/*.zip \
              "${{ steps.build.outputs.metadata_dir }}/checksums.json" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
            gh release edit "${{ steps.release_tag.outputs.target_tag }}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${{ steps.release_tag.outputs.target_tag }}" \
              --notes-file "${{ steps.build.outputs.metadata_dir }}/release-notes.md"
          else
            gh release create "${{ steps.release_tag.outputs.target_tag }}" \
              "${{ steps.build.outputs.artifacts_dir }}"/*.zip \
              "${{ steps.build.outputs.metadata_dir }}/checksums.json" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${{ steps.release_tag.outputs.remote_tag_commit }}" \
              --title "${{ steps.release_tag.outputs.target_tag }}" \
              --notes-file "${{ steps.build.outputs.metadata_dir }}/release-notes.md"
          fi

      - name: Select release commit
        if: ${{ inputs.publish_to_main }}
        id: release_commit
        run: |
          set -euo pipefail

          if [[ "${{ steps.publication.outputs.mode }}" == "fresh" ]]; then
            echo "commit_sha=${{ steps.git_release.outputs.commit_sha }}" >> "${GITHUB_OUTPUT}"
          else
            echo "commit_sha=${{ steps.release_tag.outputs.remote_tag_commit }}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Optionally update default branch
        if: ${{ inputs.publish_to_main }}
        run: |
          set -euo pipefail

          git push origin "${{ steps.release_commit.outputs.commit_sha }}:refs/heads/${DEFAULT_BRANCH}"
