name: Publish Package Release Core

on:
  workflow_call:
    inputs:
      selection_mode:
        required: true
        type: string
      upstream_tag:
        required: false
        type: string
        default: ""
      release_channel:
        required: true
        type: string
      publish_to_main:
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  resolve:
    name: Resolve release target
    runs-on: macos-15
    outputs:
      selection_mode: ${{ steps.release_tag.outputs.selection_mode }}
      release_channel: ${{ steps.release_tag.outputs.release_channel }}
      upstream_tag: ${{ steps.release_tag.outputs.upstream_tag }}
      upstream_commit: ${{ steps.release_tag.outputs.upstream_commit }}
      latest_package_tag: ${{ steps.release_tag.outputs.latest_package_tag }}
      next_package_tag: ${{ steps.release_tag.outputs.next_package_tag }}
      build_tag: ${{ steps.release_tag.outputs.build_tag }}
      remote_tag_exists: ${{ steps.release_tag.outputs.remote_tag_exists }}
      remote_tag_commit: ${{ steps.release_tag.outputs.remote_tag_commit }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Fetch upstream tag refs
        run: |
          set -euo pipefail

          python3 scripts/spm_release.py fetch-upstream-tags --remote upstream

      - name: Resolve release target
        id: release_tag
        run: |
          set -euo pipefail

          selection_mode="${{ inputs.selection_mode }}"
          requested_upstream_tag="${{ inputs.upstream_tag }}"
          release_channel="${{ inputs.release_channel }}"

          case "${selection_mode}" in
            latest)
              if [[ -n "${requested_upstream_tag}" ]]; then
                echo "selection_mode=latest does not accept an explicit upstream_tag input." >&2
                exit 1
              fi
              if [[ "${release_channel}" != "alpha" ]]; then
                echo "selection_mode=latest only supports alpha releases." >&2
                exit 1
              fi
              upstream_tag="$(python3 scripts/spm_release.py latest-fetched-upstream-stable-tag)"
              ;;
            requested)
              if [[ -z "${requested_upstream_tag}" ]]; then
                echo "selection_mode=requested requires an upstream_tag input." >&2
                exit 1
              fi
              upstream_tag="$(python3 scripts/spm_release.py assert-stable-tag --tag "${requested_upstream_tag}")"
              ;;
            *)
              echo "Unsupported selection_mode: ${selection_mode}" >&2
              exit 1
              ;;
          esac

          if [[ "${release_channel}" != "alpha" && "${release_channel}" != "stable" ]]; then
            echo "Unsupported release_channel: ${release_channel}" >&2
            exit 1
          fi

          if [[ "${release_channel}" == "stable" && "${selection_mode}" != "requested" ]]; then
            echo "Stable releases require selection_mode=requested." >&2
            exit 1
          fi

          upstream_commit="$(git rev-parse "refs/upstream-tags/${upstream_tag}^{commit}")"
          git rev-parse --verify --quiet "refs/upstream-tags/${upstream_tag}^{commit}" >/dev/null
          stable_package_tag="$(
            python3 scripts/spm_release.py package-release-tag \
              --upstream-tag "${upstream_tag}" \
              --channel stable
          )"

          latest_package_tag=
          next_package_tag=
          build_tag=
          remote_tag_exists=false
          remote_tag_commit=

          if [[ "${release_channel}" == "alpha" ]]; then
            package_tags_file="${RUNNER_TEMP}/existing-package-tags.txt"
            git ls-remote --tags --refs origin "refs/tags/${stable_package_tag}-alpha.*" \
              | awk -F'/' 'NF { print $NF }' > "${package_tags_file}"

            latest_package_tag="$(
              python3 scripts/spm_release.py latest-package-release-tag \
                --upstream-tag "${upstream_tag}" < "${package_tags_file}" || true
            )"
            next_package_tag="$(
              python3 scripts/spm_release.py next-package-release-tag \
                --upstream-tag "${upstream_tag}" < "${package_tags_file}"
            )"
            build_tag="${latest_package_tag:-${next_package_tag}}"

            if [[ -n "${latest_package_tag}" ]]; then
              git fetch --force origin "refs/tags/${latest_package_tag}:refs/tags/${latest_package_tag}"
              remote_tag_exists=true
              remote_tag_commit="$(git rev-parse "refs/tags/${latest_package_tag}^{commit}")"
            fi
          else
            build_tag="${stable_package_tag}"

            if git ls-remote --exit-code --tags --refs origin "refs/tags/${stable_package_tag}" >/dev/null 2>&1; then
              git fetch --force origin "refs/tags/${stable_package_tag}:refs/tags/${stable_package_tag}"
              remote_tag_exists=true
              remote_tag_commit="$(git rev-parse "refs/tags/${stable_package_tag}^{commit}")"
            fi
          fi

          echo "selection_mode=${selection_mode}" >> "${GITHUB_OUTPUT}"
          echo "release_channel=${release_channel}" >> "${GITHUB_OUTPUT}"
          echo "upstream_tag=${upstream_tag}" >> "${GITHUB_OUTPUT}"
          echo "upstream_commit=${upstream_commit}" >> "${GITHUB_OUTPUT}"
          echo "latest_package_tag=${latest_package_tag}" >> "${GITHUB_OUTPUT}"
          echo "next_package_tag=${next_package_tag}" >> "${GITHUB_OUTPUT}"
          echo "build_tag=${build_tag}" >> "${GITHUB_OUTPUT}"
          echo "remote_tag_exists=${remote_tag_exists}" >> "${GITHUB_OUTPUT}"
          echo "remote_tag_commit=${remote_tag_commit}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build release artifacts
    needs: resolve
    runs-on: macos-15
    env:
      SPM_RELEASE_ENABLE_CCACHE: "1"
      CCACHE_KEY_SCHEMA: v2
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_COMPILERCHECK: content
      CCACHE_NOHASHDIR: "true"
      CCACHE_MAXSIZE: 750M
    outputs:
      artifact_name: ${{ steps.upload_bundle.outputs.artifact-id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Verify build prerequisites
        run: |
          set -euo pipefail

          command -v cmake >/dev/null 2>&1 || brew install cmake
          command -v ccache >/dev/null 2>&1 || brew install ccache
          command -v xcodebuild >/dev/null
          command -v swift >/dev/null
          command -v plutil >/dev/null
          xcrun --find vtool >/dev/null
          xcrun --sdk iphoneos --show-sdk-path >/dev/null
          xcrun --sdk iphonesimulator --show-sdk-path >/dev/null
          xcrun --sdk macosx --show-sdk-path >/dev/null
          xcrun --sdk appletvos --show-sdk-path >/dev/null
          xcrun --sdk appletvsimulator --show-sdk-path >/dev/null
          xcrun --sdk watchos --show-sdk-path >/dev/null
          xcrun --sdk watchsimulator --show-sdk-path >/dev/null
          xcrun --sdk xros --show-sdk-path >/dev/null
          xcrun --sdk xrsimulator --show-sdk-path >/dev/null

      - name: Capture build cache inputs
        id: cache_inputs
        run: |
          set -euo pipefail

          mkdir -p "${CCACHE_DIR}"
          echo "CCACHE_BASEDIR=${RUNNER_TEMP}" >> "${GITHUB_ENV}"
          ccache --set-config=max_size="${CCACHE_MAXSIZE}"
          xcode_version_hash="$(xcodebuild -version | shasum -a 256 | cut -c1-16)"
          echo "xcode_version_hash=${xcode_version_hash}" >> "${GITHUB_OUTPUT}"

      - name: Fetch upstream tag refs
        run: |
          set -euo pipefail

          python3 scripts/spm_release.py fetch-upstream-tags --remote upstream

      - name: Export upstream source tree
        id: source_tree
        run: |
          set -euo pipefail

          source_dir="${RUNNER_TEMP}/libwebp-source"
          python3 scripts/spm_release.py export-upstream-source \
            --tag "${{ needs.resolve.outputs.upstream_tag }}" \
            --output-dir "${source_dir}"

          echo "source_dir=${source_dir}" >> "${GITHUB_OUTPUT}"

      - name: Restore compiler cache
        id: restore_ccache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: libwebp-ccache-${{ env.CCACHE_KEY_SCHEMA }}-${{ runner.os }}-${{ steps.cache_inputs.outputs.xcode_version_hash }}-${{ needs.resolve.outputs.upstream_commit }}-${{ hashFiles('scripts/spm_release.py', 'scripts/build_apple_xcframeworks.sh', 'config/source-acquisition.json', 'config/platforms.json') }}
          restore-keys: |
            libwebp-ccache-${{ env.CCACHE_KEY_SCHEMA }}-${{ runner.os }}-${{ steps.cache_inputs.outputs.xcode_version_hash }}-${{ needs.resolve.outputs.upstream_commit }}-
            libwebp-ccache-${{ env.CCACHE_KEY_SCHEMA }}-${{ runner.os }}-${{ steps.cache_inputs.outputs.xcode_version_hash }}-

      - name: Reset ccache statistics
        run: |
          set -euo pipefail

          ccache --zero-stats

      - name: Build release artifacts
        run: |
          set -euo pipefail

          artifacts_dir="${RUNNER_TEMP}/release-artifacts"
          metadata_dir="${RUNNER_TEMP}/release-metadata"
          working_dir="${RUNNER_TEMP}/xcframework-build"

          rm -rf "${artifacts_dir}" "${metadata_dir}" "${working_dir}"
          mkdir -p "${artifacts_dir}" "${metadata_dir}"

          ./scripts/build_apple_xcframeworks.sh \
            --source-dir "${{ steps.source_tree.outputs.source_dir }}" \
            --output-dir "${artifacts_dir}" \
            --tag "${{ needs.resolve.outputs.build_tag }}" \
            --working-dir "${RUNNER_TEMP}/xcframework-build"

          python3 scripts/spm_release.py compute-checksums \
            --archives-dir "${artifacts_dir}" \
            --output "${metadata_dir}/checksums.json"

      - name: Show ccache statistics
        if: always()
        run: |
          set -euo pipefail

          ccache --show-stats

      - name: Save compiler cache
        if: always() && !cancelled() && steps.restore_ccache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: libwebp-ccache-${{ env.CCACHE_KEY_SCHEMA }}-${{ runner.os }}-${{ steps.cache_inputs.outputs.xcode_version_hash }}-${{ needs.resolve.outputs.upstream_commit }}-${{ hashFiles('scripts/spm_release.py', 'scripts/build_apple_xcframeworks.sh', 'config/source-acquisition.json', 'config/platforms.json') }}

      - name: Upload release bundle
        id: upload_bundle
        uses: actions/upload-artifact@v7
        with:
          name: package-build-bundle-${{ github.run_id }}
          overwrite: true
          path: |
            ${{ runner.temp }}/release-artifacts
            ${{ runner.temp }}/release-metadata/checksums.json
          if-no-files-found: error

  publish:
    name: Publish package release
    needs: [resolve, build]
    runs-on: macos-15
    env:
      REPOSITORY_OWNER: ${{ github.repository_owner }}
      REPOSITORY_NAME: ${{ github.event.repository.name }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Download release bundle
        uses: actions/download-artifact@v8
        with:
          name: package-build-bundle-${{ github.run_id }}
          path: ${{ runner.temp }}/publication-inputs

      - name: Prepare release publication
        id: publication
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          artifacts_dir="${RUNNER_TEMP}/publication-inputs/release-artifacts"
          metadata_dir="${RUNNER_TEMP}/publication-inputs/release-metadata"
          validation_dir="${RUNNER_TEMP}/publication-inputs/package-validation"
          mkdir -p "${metadata_dir}" "${validation_dir}"

          prepare_args=(
            prepare-release-publication
            --selection-mode "${{ needs.resolve.outputs.selection_mode }}"
            --release-channel "${{ needs.resolve.outputs.release_channel }}"
            --upstream-tag "${{ needs.resolve.outputs.upstream_tag }}"
            --upstream-commit "${{ needs.resolve.outputs.upstream_commit }}"
            --build-tag "${{ needs.resolve.outputs.build_tag }}"
            --artifacts-dir "${artifacts_dir}"
            --metadata-dir "${metadata_dir}"
            --validation-dir "${validation_dir}"
            --package-owner "${REPOSITORY_OWNER}"
            --package-repository "${REPOSITORY_NAME}"
            --github-repository "${GITHUB_REPOSITORY}"
            --github-output "${GITHUB_OUTPUT}"
          )

          if [[ -n "${{ needs.resolve.outputs.latest_package_tag }}" ]]; then
            prepare_args+=(--latest-package-tag "${{ needs.resolve.outputs.latest_package_tag }}")
          fi
          if [[ -n "${{ needs.resolve.outputs.next_package_tag }}" ]]; then
            prepare_args+=(--next-package-tag "${{ needs.resolve.outputs.next_package_tag }}")
          fi
          if [[ "${{ needs.resolve.outputs.remote_tag_exists }}" == "true" ]]; then
            prepare_args+=(--remote-tag-exists --remote-tag-commit "${{ needs.resolve.outputs.remote_tag_commit }}")
          fi

          python3 scripts/spm_release.py "${prepare_args[@]}"

      - name: Create package commit and push release tag
        if: steps.publication.outputs.mode == 'fresh'
        id: git_release
        run: |
          set -euo pipefail

          metadata_dir="${RUNNER_TEMP}/publication-inputs/release-metadata"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          release_branch="release/${{ steps.publication.outputs.package_tag }}"
          git switch --create "${release_branch}"

          cp "${metadata_dir}/Package.swift" Package.swift
          git add Package.swift

          if git diff --cached --quiet -- Package.swift; then
            commit_sha="$(git rev-parse HEAD)"
          else
            git commit -m "Release ${{ steps.publication.outputs.package_tag }}"
            commit_sha="$(git rev-parse HEAD)"
          fi

          git tag "${{ steps.publication.outputs.package_tag }}" "${commit_sha}"
          git push origin "refs/tags/${{ steps.publication.outputs.package_tag }}"

          echo "commit_sha=${commit_sha}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        if: steps.publication.outputs.mode == 'fresh'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          artifacts_dir="${RUNNER_TEMP}/publication-inputs/release-artifacts"
          metadata_dir="${RUNNER_TEMP}/publication-inputs/release-metadata"
          release_args=(
            "${{ steps.publication.outputs.package_tag }}"
            "${artifacts_dir}"/*.zip
            "${metadata_dir}/checksums.json"
            --repo "${GITHUB_REPOSITORY}"
            --target "${{ steps.git_release.outputs.commit_sha }}"
            --title "${{ steps.publication.outputs.package_tag }}"
            --notes-file "${metadata_dir}/release-notes.md"
          )

          if [[ "${{ needs.resolve.outputs.release_channel }}" == "alpha" ]]; then
            release_args+=(--prerelease --latest=false)
          fi

          gh release create "${release_args[@]}"

      - name: Repair GitHub release
        if: steps.publication.outputs.mode == 'repair'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          artifacts_dir="${RUNNER_TEMP}/publication-inputs/release-artifacts"
          metadata_dir="${RUNNER_TEMP}/publication-inputs/release-metadata"

          if [[ "${{ steps.publication.outputs.release_exists }}" == "true" ]]; then
            gh release upload "${{ steps.publication.outputs.package_tag }}" \
              "${artifacts_dir}"/*.zip \
              "${metadata_dir}/checksums.json" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
            gh release edit "${{ steps.publication.outputs.package_tag }}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${{ steps.publication.outputs.package_tag }}" \
              --notes-file "${metadata_dir}/release-notes.md"
          else
            release_args=(
              "${{ steps.publication.outputs.package_tag }}"
              "${artifacts_dir}"/*.zip
              "${metadata_dir}/checksums.json"
              --repo "${GITHUB_REPOSITORY}"
              --target "${{ steps.publication.outputs.remote_tag_commit }}"
              --title "${{ steps.publication.outputs.package_tag }}"
              --notes-file "${metadata_dir}/release-notes.md"
            )

            if [[ "${{ needs.resolve.outputs.release_channel }}" == "alpha" ]]; then
              release_args+=(--prerelease --latest=false)
            fi

            gh release create "${release_args[@]}"
          fi

      - name: Normalize GitHub release metadata
        if: steps.publication.outputs.mode != 'skip'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          metadata_dir="${RUNNER_TEMP}/publication-inputs/release-metadata"
          release_id="$(
            gh release view "${{ steps.publication.outputs.package_tag }}" \
              --repo "${GITHUB_REPOSITORY}" \
              --json databaseId \
              --jq '.databaseId'
          )"

          if [[ "${{ needs.resolve.outputs.release_channel }}" == "alpha" ]]; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              -F prerelease=true \
              -F make_latest=false \
              -f name="${{ steps.publication.outputs.package_tag }}" \
              -F body=@${metadata_dir}/release-notes.md >/dev/null
          else
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              -F prerelease=false \
              -f name="${{ steps.publication.outputs.package_tag }}" \
              -F body=@${metadata_dir}/release-notes.md >/dev/null
          fi

      - name: Select release commit
        if: ${{ inputs.publish_to_main && steps.publication.outputs.mode != 'skip' }}
        id: release_commit
        run: |
          set -euo pipefail

          if [[ "${{ steps.publication.outputs.mode }}" == "fresh" ]]; then
            echo "commit_sha=${{ steps.git_release.outputs.commit_sha }}" >> "${GITHUB_OUTPUT}"
          else
            echo "commit_sha=${{ steps.publication.outputs.remote_tag_commit }}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Optionally update default branch
        if: ${{ inputs.publish_to_main && steps.publication.outputs.mode != 'skip' }}
        run: |
          set -euo pipefail

          git push origin "${{ steps.release_commit.outputs.commit_sha }}:refs/heads/${DEFAULT_BRANCH}"
